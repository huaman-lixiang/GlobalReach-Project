# GlobalReach V2.0 — Grafana Custom Configuration
# M-B01: UI Policy — Anonymous Viewer Access + Security Hardening
# Protocol: v6.0-STEADY-STATE-EVOLUTION | Session: S128

[server]
# S128/M-B01: Bind to all interfaces inside container (default)
http_addr = 0.0.0.0
http_port = 3000
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s/
serve_from_sub_path = false

[security]
# S128/M-B01: Disable external avatar requests (privacy + security)
disable_gravatar = true
# Local development: cookie secure off (no TLS on localhost)
cookie_secure = false
# Strict cookie settings
cookie_samesite = lax
# Content Security Policy headers (basic)
content_security_policy = false
strict_transport_security = false

[auth.anonymous]
# S128/M-B01: Enable anonymous access with Viewer role (read-only)
enabled = true
org_name = Main Org.
org_role = Viewer

[users]
# Prevent self-signup (enforced via env var too, belt-and-suspenders)
allow_sign_up = false
# Default theme
default_theme = dark

[dashboards]
# Default home dashboard
default_home_dashboard_path = /var/lib/grafana/dashboards/globalreach-overview.json

[log]
# Log level
level = info
mode = console file

[paths]
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning
