# ============================================
# M-B02: GlobalReach Business Alert Rules
# ============================================
# Business-level alerts for email marketing operations.
# These complement the infrastructure alerts in alerts.yml.

groups:
  - name: globalreach_business_alerts
    interval: 30s
    rules:
      # ── Email Delivery Alerts ───────────────────────────

      # Email success rate drops below 85%
      - alert: HighEmailFailureRate
        expr: globalreach:email_success_rate_5m < 0.85
        for: 10m
        labels:
          severity: warning
          team: operations
        annotations:
          summary: "邮件发送成功率低于85%"
          description: "10分钟内邮件发送成功率 {{ $value | humanizePercentage }}，需要检查SMTP提供商状态和队列健康度"
          runbook_url: "https://docs.globalreach.com/runbooks/email-failure-rate"

      # Zero emails sent in last 10 minutes (pipeline stall)
      - alert: EmailPipelineStalled
        expr: globalreach:emails_per_minute_5m == 0
        for: 10m
        labels:
          severity: info
          team: operations
        annotations:
          summary: "邮件发送管道停滞"
          description: "过去10分钟内没有邮件被发送，请检查SendWorker和EmailQueue状态"

      # ── API Performance Alerts ──────────────────────────

      # API P99 latency exceeds 5 seconds
      - alert: HighAPILatency
        expr: globalreach:api_p99_latency_ms_5m > 5000
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "API P99延迟过高"
          description: "API P99延迟达到 {{ $value }}ms（阈值5s），用户可能感知到明显卡顿"

      # API error rate exceeds 10%
      - alert: HighAPIErrorRate
        expr: globalreach:api_error_rate_5m > 0.1
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "API错误率过高 (>10%)"
          description: "10分钟内API错误率为 {{ $value | humanizePercentage }}，请检查错误日志"

      # ── Queue Backlog Alerts ─────────────────────────────

      # Pending queue exceeds 2000 emails
      - alert: EmailQueueBacklog
        expr: globalreach_queue_depth{state="pending"} > 2000
        for: 15m
        labels:
          severity: info
          team: operations
        annotations:
          summary: "邮件队列积压"
          description: "待发送邮件队列深度 {{ $value }}，超过2000的告警阈值"

      # Pending queue critically high (>8000)
      - alert: EmailQueueCritical
        expr: globalreach_queue_depth{state="pending"} > 8000
        for: 10m
        labels:
          severity: critical
          team: operations
        annotations:
          summary: "邮件队列严重积压"
          description: "待发送邮件队列深度 {{ $value }}，超过8000临界值！需立即扩容或排查阻塞原因"

      # Failed queue accumulating (>200)
      - alert: EmailFailuresAccumulating
        expr: globalreach_queue_depth{state="failed"} > 200
        for: 20m
        labels:
          severity: warning
          team: operations
        annotations:
          summary: "失败邮件持续累积"
          description: "失败队列中已有 {{ $value }} 封邮件，请检查失败原因并考虑重试策略"

      # ── Business Health Alerts ───────────────────────────

      # No active campaigns (business may be idle or broken)
      - alert: NoActiveCampaigns
        expr: globalreach_campaigns_active == 0
        for: 30m
        labels:
          severity: info
          team: business
        annotations:
          summary: "无活跃营销活动"
          description: "已连续30分钟没有活跃的营销活动，如非预期请确认业务状态"

      # Sudden spike in client count (data anomaly detection)
      - alert: ClientCountAnomaly
        expr: |
          abs(
            globalreach_clients_total
            -
            globalreach:clients_current_snapshot offset 1h
          ) / globalreach:clients_current_snapshot offset 1h > 0.5
        for: 5m
        labels:
          severity: info
          team: business
        annotations:
          summary: "客户数量异常波动"
          description: "客户数量在1小时内变化超过50%，当前值 {{ $value }}"

      # ── M-B04 New Critical Alerts ──────────────────────

      # API P95 latency sustained high (>500ms for 10 minutes)
      - alert: SustainedHighLatencyP95
        expr: histogram_quantile(0.95, sum(rate(globalreach_api_request_duration_seconds_bucket[5m])) by (le)) > 0.5
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "API P95延迟持续偏高"
          description: "10分钟内API P95延迟 {{ $value }}s > 500ms"

      # Database connection pool approaching exhaustion (>80%)
      - alert: DatabaseConnectionPoolHigh
        expr: globalreach_db_connections_active / 20 > 0.8
        for: 5m
        labels:
          severity: warning
          team: database
        annotations:
          summary: "数据库连接池使用率过高"
          description: "活跃连接占连接池 {{ $value | humanizePercentage }}"

      # Redis memory usage >70%
      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.7
        for: 10m
        labels:
          severity: info
          team: database
        annotations:
          summary: "Redis内存使用率偏高"
          description: "Redis内存使用 {{ $value | humanizePercentage }}"
