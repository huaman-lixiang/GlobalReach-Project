groups:
  # ──────────────────────────────────────────────
  # CRITICAL Alerts (immediate action required)
  # ──────────────────────────────────────────────
  - name: globalreach-critical
    interval: 30s
    rules:
      - alert: APIDown
        expr: up{job="globalreach-api"} == 0
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "GlobalReach API is DOWN"
          description: "API instance {{ $labels.instance }} has been down for more than 2 minutes."
          runbook_url: "https://docs.globalreach.com/runbooks/api-down"

      - alert: HighErrorRate
        expr: |
          (
            rate(http_requests_total{status=~"5.."}[5m])
            /
            rate(http_requests_total[5m])
          ) > 0.1
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High API Error Rate (>10%)"
          description: "Error rate is {{ $value | humanizePercentage }} over 5min window."
          runbook_url: "https://docs.globalreach.com/runbooks/high-error-rate"

      - alert: ContainerRestartLoop
        expr: changes(container_start_time_seconds[1h]) > 5
        for: 10m
        labels:
          severity: critical
          team: platform
          service: api
          runbook: "RB-003"
        annotations:
          summary: "Container Restart Loop Detected"
          description: "Container {{ $labels.instance }} restarted {{ $value }} times in last hour."
          runbook: "RB-003_CONTAINER.md#Restart-Loop"
          escalation: "oncall-platform"
          dashboard: "grafana/dash/container-health"

      # S098/PhaseH: Health score collapse — most severe degradation
      - alert: APIHealthCritical
        expr: globalreach_health_score < 50
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "GlobalReach API Health CRITICAL (<50)"
          description: "Health score = {{ $value }}/100 — immediate investigation required."
          runbook_url: "https://docs.globalreach.com/runbooks/health-critical"

  # ──────────────────────────────────────────────
  # INFRASTRUCTURE Warnings (resource pressure)
  # ──────────────────────────────────────────────
  - name: globalreach-warning
    interval: 60s
    rules:
      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 3
        for: 15m
        labels:
          severity: warning
          team: platform
          service: api
          runbook: "RB-001"
        annotations:
          summary: "High API P95 Latency (>3s)"
          description: "P95 latency = {{ $value }}s over 5min."
          runbook: "RB-001_API_SERVICE.md#Latency-P95"
          escalation: "oncall-platform"
          dashboard: "grafana/dash/api-latency"

      - alert: PostgresConnectionHigh
        expr: pg_stat_activity_count > 80
        for: 20m
        labels:
          severity: warning
          team: database
          service: postgres
          runbook: "RB-002"
        annotations:
          summary: "High PostgreSQL Connections (>80)"
          description: "Active connections: {{ $value }}"
          runbook: "RB-002_POSTGRES.md#Connections"
          escalation: "team-database"
          dashboard: "grafana/dash/postgres-overview"

      - alert: RedisMemoryHigh
        expr: redis_used_memory / redis_maxmemory > 0.85
        for: 15m
        labels:
          severity: warning
          team: database
          service: redis
          runbook: "RB-004"
        annotations:
          summary: "Redis Memory Usage High (>85%)"
          description: "Redis memory usage at {{ $value | humanizePercentage }} of max."
          runbook: "RB-004_REDIS.md#Memory"
          escalation: "team-database"
          dashboard: "grafana/dash/redis-overview"

      - alert: NodeFileSystemFull
        expr: |
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} /
            node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}
          ) < 0.15
        for: 20m
        labels:
          severity: warning
          team: infra
          service: node
          runbook: "RB-005"
        annotations:
          summary: "Low Disk Space (<15% free)"
          description: "{{ $labels.mountpoint }}: {{ $value | humanizePercentage }} free"
          runbook: "RB-005_INFRA.md#Disk"
          escalation: "team-infra"
          dashboard: "grafana/dash/node-resources"

      - alert: NodeHighMemory
        expr: |
          (
            node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes
          ) / node_memory_MemTotal_bytes > 0.9
        for: 20m
        labels:
          severity: warning
          team: infra
          service: node
          runbook: "RB-005"
        annotations:
          summary: "High Host Memory Usage (>90%)"
          description: "Host memory usage at {{ $value | humanizePercentage }}"
          runbook: "RB-005_INFRA.md#Memory"
          escalation: "team-infra"
          dashboard: "grafana/dash/node-resources"

      - alert: NodeHighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 20m
        labels:
          severity: warning
          team: infra
          service: node
          runbook: "RB-005"
        annotations:
          summary: "High Host CPU Usage (>90%)"
          description: "Host CPU usage at {{ $value }}%"
          runbook: "RB-005_INFRA.md#CPU"
          escalation: "team-infra"
          dashboard: "grafana/dash/node-resources"

  # ──────────────────────────────────────────────
  # API-SPECIFIC Alerts (S098/PhaseH additions)
  # ──────────────────────────────────────────────
  - name: globalreach-api-specific
    interval: 30s
    rules:
      # Health score gradual degradation (early warning before critical)
      - alert: APIHealthDegraded
        expr: globalreach_health_score < 75
        for: 5m
        labels:
          severity: warning
          team: platform
          service: api
          runbook: "RB-001"
        annotations:
          summary: "GlobalReach API Health Degraded (<75)"
          description: "Health score = {{ $value }}/100. Check /api/v1/health for details."
          runbook: "RB-001_API_SERVICE.md#Health-Score"
          escalation: "oncall-platform"
          dashboard: "grafana/dash/api-health"

      # P50 latency early detection (users notice before P95 spikes)
      - alert: APILatencyP50Elevated
        expr: |
          histogram_quantile(0.50, rate(http_request_duration_seconds_bucket[5m])) > 0.3
        for: 10m
        labels:
          severity: warning
          team: platform
          service: api
          runbook: "RB-001"
        annotations:
          summary: "API Median Latency Elevated (>300ms)"
          description: "P50 = {{ $value }}s. Users may notice slowdown."
          runbook: "RB-001_API_SERVICE.md#Latency-P50"
          escalation: "oncall-platform"
          dashboard: "grafana/dash/api-latency"

      # Container memory pressure (RSS-based, not V8 heap)
      - alert: APIMemoryPressure
        expr: |
          container_memory_rss{container=~".*api.*"}
          /
          container_spec_memory_limit{container=~".*api.*"} > 0.8
        for: 15m
        labels:
          severity: warning
          team: platform
          service: api
          runbook: "RB-003"
        annotations:
          summary: "API Container Memory Pressure (>80% RSS)"
          description: "RSS usage = {{ $value | humanizePercentage }} of limit."
          runbook: "RB-003_CONTAINER.md#Memory-Pressure"
          escalation: "oncall-platform"
          dashboard: "grafana/dash/container-health"

      # Throughput anomaly detection (sudden drop)
      - alert: APIThroughputAnomaly
        expr: |
          (
            rate(http_requests_total{job="globalreach-api"}[5m])
            /
            rate(http_requests_total{job="globalreach-api"}[30m] offset 25m)
          ) < 0.5
        for: 15m
        labels:
          severity: warning
          team: platform
          service: api
          runbook: "RB-001"
        annotations:
          summary: "API Throughput Dropped 50%+"
          description: "Current throughput is {{ $value | humanizePercentage }} of 30-min average."
          runbook: "RB-001_API_SERVICE.md#Throughput"
          escalation: "oncall-platform"
          dashboard: "grafana/dash/api-throughput"

  # ──────────────────────────────────────────────
  # LOG-BASED ALERTS: See prometheus/rules/loki-alerts-reference.yml
  # These use LogQL syntax (|=, |~) which is Loki-specific.
  # Import into Grafana Alerting or use loki-adapter with Prometheus.
  # ──────────────────────────────────────────────
