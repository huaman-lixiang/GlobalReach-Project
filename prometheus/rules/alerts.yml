groups:
  - name: globalreach-critical
    interval: 30s
    rules:
      - alert: APIDown
        expr: up{job="globalreach-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "GlobalReach API is DOWN"
          description: "API instance {{ $labels.instance }} has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          (
            rate(http_requests_total{status=~"5.."}[5m])
            /
            rate(http_requests_total[5m])
          ) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High API Error Rate"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 10%)"

      - alert: ContainerRestartLoop
        expr: changes(container_start_time_seconds[1h]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container Restart Loop Detected"
          description: "Container {{ $labels.instance }} has restarted more than 5 times in the last hour."

  - name: globalreach-warning
    interval: 60s
    rules:
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High API Latency (P95)"
          description: "P95 latency is {{ $value }}s (threshold: 2s)"

      - alert: PostgresConnectionHigh
        expr: pg_stat_activity_count > 80
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High PostgreSQL Connections"
          description: "PostgreSQL active connections: {{ $value }} (threshold: 80)"

      - alert: RedisMemoryHigh
        expr: redis_used_memory / redis_maxmemory > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Redis Memory Usage High"
          description: "Redis memory usage is above 80% of max memory"

      - alert: NodeFileSystemFull
        expr: |
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} /
            node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}
          ) < 0.20
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Low Disk Space"
          description: "Filesystem {{ $labels.mountpoint }} has less than 20% free space"

      - alert: NodeHighMemory
        expr: |
          (
            node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes
          ) / node_memory_MemTotal_bytes > 0.85
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High Host Memory Usage"
          description: "Host memory usage is above 85%"

      - alert: NodeHighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High Host CPU Usage"
          description: "Host CPU usage is above 90% (instance: {{ $labels.instance }})"
