# GlobalReach V2.0 — Production Docker Compose
# S071: Fixed for production deployment (CI/CD compatible)
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    # S118/SEC-002: PostgreSQL version pinning
    # NOTE: Upgrading from 15→16 requires pg_upgrade or dump/restore (data dir incompatible)
    # Current: postgres:15-alpine (gosu has 1 LOW-RISK CRITICAL: CVE-2025-68121)
    #   Mitigation: gosu runs ONLY at container startup, no network exposure
    # Upgrade path: docker exec pg_dumpall > backup.sql → change image → psql < backup.sql
    image: postgres:15-alpine
    container_name: globalreach-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-globalreach_prod}
      POSTGRES_USER: ${DB_USER:-globalreach_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    networks:
      - globalreach-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-globalreach_user} -d ${DB_NAME:-globalreach_prod}"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: globalreach-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - globalreach-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: globalreach-project-api:${IMAGE_TAG:-latest}
    container_name: globalreach-api-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=384
      DATABASE_URL: postgresql://${DB_USER:-globalreach_user}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-globalreach_prod}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-globalreach_prod}
      DB_USER: ${DB_USER:-globalreach_user}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-min-32-chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      CSRF_SECRET: ${CSRF_SECRET:-change-this-csrf-secret}
      APP_NAME: GlobalReach-V2
      LOG_LEVEL: info
      PORT: "3000"
      # S112/PhaseI: Rate Limit tuning (production values)
      # L2 Express rate limiter: 30000 req / 15min = ~33 rps (was 1000 = 1.11 rps)
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-30000}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
    networks:
      - globalreach-network
    ports:
      - "${API_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: globalreach-nginx-prod
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl/globalreach:/etc/nginx/ssl/globalreach:ro
      - ./nginx/ssl/letsencrypt:/etc/nginx/ssl/le:ro          # S101: Let's Encrypt certs (when issued)
      - ./frontend/dist:/var/www/frontend/dist:ro
      - ./docs:/usr/share/nginx/html/docs:ro  # S088: Serve documentation via Nginx
      - ./nginx/acme-challenge:/var/www/acme-challenge:ro  # S101: ACME challenge (simplified path)
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - globalreach-network
    healthcheck:
      test: ["CMD-SHELL", "kill -0 $(cat /var/run/nginx.pid 2>/dev/null) 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:latest
    container_name: globalreach-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - globalreach-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: globalreach-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # S106/PhaseH: Grafana Alerting — SMTP Configuration (S116: Production-ready)
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: ${GRAFANA_SMTP_HOST:-mailpit:1025}
      GF_SMTP_USER: ${GRAFANA_SMTP_USER:-""}
      GF_SMTP_PASSWORD: ${GRAFANA_SMTP_PASSWORD:-""}
      GF_SMTP_FROM_ADDRESS: ${GRAFANA_SMTP_FROM:-noreply@globalreach.com}
      GF_SMTP_FROM_NAME: "GlobalReach Monitor"
      # S106/PhaseH: Alert Notification Environment Variables
      GRAFANA_ALERT_EMAIL_TO: ${GRAFANA_ALERT_EMAIL_TO:-admin@globalreach.local}
      GRAFANA_ALERT_WEBHOOK_URL: ${GRAFANA_ALERT_WEBHOOK_URL:-}
    ports:
      - "3002:3000"
    networks:
      - globalreach-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  node-exporter:
    image: prom/node-exporter:latest
    container_name: globalreach-node-exporter
    restart: unless-stopped
    networks:
      - globalreach-network
    deploy:
      resources:
        limits:
          memory: 128M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: globalreach-pg-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-globalreach_user}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-globalreach_prod}?sslmode=disable"
    networks:
      - globalreach-network
    depends_on:
      postgres:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 128M

  # S099/PhaseH: Grafana Loki — Log Aggregation (Monolithic Mode)
  # Note: grafana/loki image is distroless (no curl/wget) — healthcheck disabled
  # Readiness verified externally: curl localhost:3100/ready → "ready"
  loki:
    image: grafana/loki:latest
    container_name: globalreach-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - globalreach-network

  # S099/PhaseH: Promtail — Log Collector for Docker Containers
  # S117/S118 Security: Docker socket mounted READ-ONLY (:ro) — mitigates CVE-2026-34040,
  #   CVE-2026-41567, CVE-2026-42306 (Docker Moby host escape vectors)
  #   Container logs are read-only; no write access to Docker API
  promtail:
    image: grafana/promtail:latest
    container_name: globalreach-promtail
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_started
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
    networks:
      - globalreach-network

  # S102/PhaseH: Grafana Tempo — Distributed Tracing Backend
  # Accepts OTLP (gRPC:4317, HTTP:4318) from instrumented applications
  # Query via Grafana Tempo datasource or /api/traces endpoint
  tempo:
    image: grafana/tempo:2.5.0
    container_name: globalreach-tempo
    restart: unless-stopped
    user: "0:0"
    command: ["-config.file=/etc/tempo/tempo-config.yml", "-target=all", "-server.http-listen-port=3200"]
    volumes:
      - ./tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo_data:/var/lib/tempo
    ports:
      - "3200:3200"     # Tempo query API + UI
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
    networks:
      - globalreach-network

  # S107/PhaseH: Prometheus AlertManager — Notification Routing
  # Routes Prometheus alerts (14 rules) to email/webhook receivers
  # S116: Production SMTP support via ALERTMANAGER_* env vars
  alertmanager:
    image: prom/alertmanager:latest
    container_name: globalreach-alertmanager
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    environment:
      # S116: Override alertmanager.yml defaults with production SMTP settings
      # These are passed through to the config file's ${VAR} placeholders
      ALERTMANAGER_SMTP_SMARTHOST: ${ALERTMANAGER_SMTP_SMARTHOST:-mailpit:1025}
      ALERTMANAGER_SMTP_USER: ${ALERTMANAGER_SMTP_USER:-}
      ALERTMANAGER_SMTP_PASS: ${ALERTMANAGER_SMTP_PASS:-}
      ALERTMANAGER_SMTP_FROM: ${ALERTMANAGER_SMTP_FROM:-alert@globalreach.local}
      ALERTMANAGER_EMAIL_TO: ${ALERTMANAGER_EMAIL_TO:-admin@globalreach.com}
      ALERTMANAGER_SMTP_REQUIRE_TLS: ${ALERTMANAGER_SMTP_REQUIRE_TLS:-false}
      ALERTMANAGER_SMTP_HELLO: ${ALERTMANAGER_SMTP_HELLO:-localhost}
      ALERTMANAGER_WEBHOOK_URL: ${ALERTMANAGER_WEBHOOK_URL:-}
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    ports:
      - "9093:9093"
    networks:
      - globalreach-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # S108/PhaseH: Mailpit — SMTP Test Server (Development)
  # Provides SMTP (:1025) + Web UI (:8025) for alert email verification
  # In production, replace with real SMTP relay (Gmail SES, SendGrid, etc.)
  mailpit:
    image: axllent/mailpit:latest
    container_name: globalreach-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"     # Web UI: http://localhost:8025
      - "1025:1025"     # SMTP server
    networks:
      - globalreach-network

  # S119/Post-Go-Live: Let's Encrypt Certificate Management (certbot)
  #
  # Usage:
  #   Initial issuance: docker compose -f docker-compose.prod.yml run --rm --profile ssl certbot
  #   Renewal:          docker compose -f docker-compose.prod.yml run --rm --profile ssl certbot renew
  #   Dry-run test:     docker compose -f docker-compose.prod.yml run --rm --profile ssl certbot renew --dry-run
  #   One-click switch: bash scripts/ssl-switch-to-letsencrypt.sh
  #
  # S119 Enhancement: Added deploy hooks for auto-reload on renewal
  certbot:
    image: certbot/certbot:latest
    container_name: globalreach-certbot
    profiles: ["ssl"]  # Only start when explicitly requested: --profile ssl
    volumes:
      - ./nginx/ssl/letsencrypt:/etc/letsencrypt
      - ./nginx/acme-challenge:/var/www/acme-challenge
      - /var/run/docker.sock:/var/run/docker.sock  # S119: Allow deploy hook to reload Nginx
    environment:
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-admin@globalreach.com}
      CERTBOT_DOMAINS: ${CERTBOT_DOMAINS:-api.globalreach.com,app.globalreach.com,monitor.globalreach.com,grafana.globalreach.com}
    networks:
      - globalreach-network
    entrypoint: ["sh", "-c"]
    # S119: Interactive mode — use 'certonly' for initial issue, 'renew' for续期
    # Deploy hook automatically reloads Nginx container after successful renewal
    command: |
      certonly --webroot \
        -w /var/www/acme-challenge \
        -d api.globalreach.com \
        -d app.globalreach.com \
        -d monitor.globalreach.com \
        -d grafana.globalreach.com \
        --email "${LETSENCRYPT_EMAIL:-admin@globalreach.com}" \
        --agree-tos --no-eff-email \
        --deploy-hook "docker exec globalreach-nginx nginx -s reload" || true

volumes:
  postgres_data:
  redis_data:
  nginx_logs:
  prometheus_data:
  grafana_data:
  loki_data:
  promtail_positions:
  tempo_data:
  alertmanager_data:

networks:
  globalreach-network:
    external: true
    name: globalreach-project_globalreach-network
