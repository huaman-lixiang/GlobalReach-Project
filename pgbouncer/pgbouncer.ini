# GlobalReach V2.0 — PgBouncer HA 配置
# ============================================
# 文档: docs/HIGH_AVAILABILITY_ARCHITECTURE.md 第四章
# 用途: PostgreSQL 连接池中间件 (事务级模式)
# 端口: 6432 (应用连接) / 6433 (Admin 接口)
# ============================================

[databases]
# 数据库连接定义
# 格式: dbname=host:port dbname,user,password
globalreach_prod = host=postgres-primary port=5432 dbname=globalreach_prod

[pgbouncer]
# ---- 基础配置 ----
listen_addr = 0.0.0.0
listen_port = 6432

# ---- 连接池模式 ----
# transaction: 事务级 (推荐, 每个事务复用一个连接)
# session:    会话级 (兼容性最好, 但性能较差)
# statement:  语句级 (最激进, 不支持事务内多语句)
pool_mode = transaction

# ---- 连接池大小 ----
# default_pool_size: 每个 (用户,数据库) 对默认保持的连接数
default_pool_size = 25

# min_pool_size: 最小空闲连接数 (预热)
min_pool_size = 5

# reserve_pool_size: 超出 default_pool_size 后的额外连接数
reserve_pool_size = 5
reserve_pool_timeout = 3

# max_client_conn: 允许的最大客户端连接数
max_client_conn = 500

# ---- 认证配置 ----
# auth_type: md5 (PostgreSQL MD5) / scram-sha-256 / trust / any
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# ---- 超时设置 ----
# 客户端空闲超时 (秒), 0 表示禁用
server_idle_timeout = 300

# 服务端连接查询超时
server_connect_timeout = 10

# 服务端登录超时
server_login_timeout = 60

# 客户端查询超时
query_timeout = 120

# 客户端空闲超时
client_idle_timeout = 0

# 客户端登录超时
client_login_timeout = 60

# 死连接清理间隔
server_check_delay = 30

# ---- 日志配置 ----
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

# 统计信息刷新周期 (秒)
stats_period = 60

# ---- Admin 管理 ----
admin_users = pgbouncer_admin
stats_users = pgbouncer_stats

# ---- 健康检查 ----
# 定期验证服务端连接是否存活
server_check_query = SELECT 1
server_reset_query = DISCARD ALL

# ---- TLS/SSL (可选, 生产环境推荐启用) ----
# server_tls_sslmode = require
# client_tls_sslmode = require
# client_tls_cert_file = /etc/pgbouncer/client.crt
# client_tls_key_file = /etc/pgbouncer/client.key
