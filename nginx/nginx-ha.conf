# GlobalReach V2.0 — Nginx HA 主配置文件
# ============================================================
# 文档: docs/HIGH_AVAILABILITY_ARCHITECTURE.md 第四章 §4.3
# 基于 nginx:1.31.1-alpine 官方镜像默认配置优化
# 特性: 高并发、低延迟、安全加固
# ============================================================

# ---- 运行身份 ----
user nginx;

# ---- Worker 进程 ----
# auto: 自动检测 CPU 核心数 (Docker 中通常限制为 1-2 核)
worker_processes auto;

# ---- 错误日志 ----
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

# ---- 性能调优 ----
events {
    # 单 worker 最大并发连接数
    worker_connections 2048;

    # 使用 epoll (Linux 高效 I/O 多路复用)
    use epoll;

    # 允许一个进程同时接受多个连接
    multi_accept on;
}

http {
    # ---- 基础 Include ----
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- 日志格式 ----
    # JSON 格式便于 Loki/ELK 结构化分析
    log_format json_combined escape=json
        '{'
            '"time_local":"$time_local",'
            '"remote_addr":"$remote_addr",'
            '"remote_user":"$remote_user",'
            '"request":"$request",'
            '"status": "$status",'
            '"body_bytes_sent":"$body_bytes_sent",'
            '"request_time":"$request_time",'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_forwarded_for":"$http_x_forwarded_for",'
            '"request_id":"$request_id"'
        '}';

    # ---- 性能优化 ----
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # ---- Keepalive (客户端 ↔ Nginx) ----
    keepalive_timeout 65;
    keepalive_requests 1000;

    # ---- 隐藏版本号 (安全) ----
    server_tokens off;

    # ---- 请求体大小限制 ----
    client_max_body_size 20m;
    client_body_buffer_size 128k;
    client_body_timeout 30s;

    # ---- 速率限制 Zone (防 DDoS) ----
    # 全局限流: 100 req/s per IP
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=100r/s;
    limit_req_status 429;

    # ---- Gzip 全局配置 ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/xml
        image/svg+xml;

    # ---- Upstream HA 配置 (外部文件引入) ----
    include /etc/nginx/conf.d/upstream-ha.conf;
}
