# GlobalReach V2.0 — Nginx Upstream HA 负载均衡配置
# ============================================================
# 文档: docs/HIGH_AVAILABILITY_ARCHITECTURE.md 第四章 §4.3
# 特性:
#   - least_conn: 最少连接算法 (长连接场景更均衡)
#   - keepalive 32: 上游长连接池 (减少 TCP 握手开销)
#   - max_fails=3 fail_timeout=30s: 健康检查与故障摘除
#   - proxy_next_upstream: 上游故障自动切换下一个节点
# ============================================================

# ============================================================
# Upstream Pool: API 后端服务 (多实例负载均衡)
# ============================================================
upstream api_backend {
    # 负载均衡算法: least_conn (最少连接优先)
    # 适用场景: API 请求耗时差异大时比 round_robin 更均衡
    # 备选: ip_hash (会话粘滞, 不适用于无状态化 API)

    least_conn;

    # API 实例列表 (通过 Docker DNS 解析)
    server api-prod-01:3000 weight=1 max_fails=3 fail_timeout=30s;
    server api-prod-02:3000 weight=1 max_fails=3 fail_timeout=30s;

    # ---- 长连接池 ----
    # keepalive 32: Nginx 与上游保持最多 32 个空闲长连接
    # 减少每次请求的 TCP 握手/TLS 协商开销 (~50-200ms/次)
    keepalive 32;

    # ---- 连接保活 ----
    keepalive_requests 1000;     # 单个长连接最大请求数
    keepalive_timeout 60s;       # 空闲长连接超时时间
}

# ============================================================
# Server Block: HTTP → HTTPS 重定向
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME HTTP-01 验证路径 (Let's Encrypt 证书续签)
    location /.well-known/acme-challenge/ {
        root /var/www/acme-challenge;
        allow all;
    }

    # 其余所有流量强制跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# Server Block: HTTPS 主站 (HA 版本)
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mail.globalreach.cn api.globalreach.cn;

    # ---- SSL/TLS 配置 ----
    ssl_certificate     /etc/nginx/ssl/globalreach/globalreach-new.pem;
    ssl_certificate_key /etc/nginx/ssl/globalreach/globalreach-new.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Gzip 压缩 ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ---- 访问日志 (JSON 格式, 便于 ELK/Loki 分析) ----
    access_log /var/log/nginx/ha_access.log json_combined;
    error_log  /var/log/nginx/ha_error.log warn;

    # ============================================================
    # Location: API 反向代理 (核心路由)
    # ============================================================
    location /api/ {
        proxy_pass http://api_backend;

        # ---- Header 传递 ----
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;

        # ---- 连接配置 ----
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # ---- 超时设置 ----
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;

        # ---- 故障转移 ----
        # 当上游返回错误码或超时时, 自动尝试下一个节点
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;

        # ---- 缓冲区 ----
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;

        # ---- 请求体限制 ----
        client_max_body_size 20m;
    }

    # ============================================================
    # Location: WebSocket 支持 (Socket.io / 实时通知)
    # ============================================================
    location /socket.io/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket 超时需更长 (长连接场景)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ============================================================
    # Location: 前端静态资源
    # ============================================================
    location / {
        root /var/www/frontend/dist;
        index index.html;

        # SPA 路由回退 (Vue Router history mode)
        try_files $uri $uri/ /index.html;

        # 静态资源缓存策略
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ============================================================
    # Location: API 文档
    # ============================================================
    location /docs {
        alias /usr/share/nginx/html/docs;
        autoindex on;
    }

    # ============================================================
    # Error Pages: JSON 化错误响应 (API 友好)
    # ============================================================
    error_page 500 502 503 504 /error.json;
    location = /error.json {
        default_type application/json;
        return 503 '{"status":"error","code":503,"message":"Service temporarily unavailable","timestamp":"$time_iso8601"}';
    }

    error_page 404 /404.json;
    location = /404.json {
        default_type application/json;
        return 404 '{"status":"error","code":404,"message":"Resource not found","path":"$request_uri"}';
    }
}
