# ============================================================
# GlobalReach V2.0 - Production SSL (Let's Encrypt) Configuration
# S119/Post-Go-Live: SSL Migration — Self-Signed → Let's Encrypt
#
# USAGE: Replace nginx/conf.d/production.conf ssl_certificate paths
#        OR use this as a drop-in include after LE certs are issued.
#
# SWITCH: See scripts/ssl-switch-to-letsencrypt.sh for one-command migration
# ============================================================

# ---- HTTP → HTTPS Redirect (All Domains) ----
server {
    listen 80;
    server_name api.globalreach.com app.globalreach.com monitor.globalreach.com grafana.globalreach.com prometheus.globalreach.com localhost;

    # Let's Encrypt ACME Challenge (MUST be before redirect)
    # Certbot places challenge files here; LE validates via HTTP port 80
    location /.well-known/acme-challenge/ {
        root /var/www/acme-challenge/;
        allow all;
        access_log off;
    }

    # Health check endpoint (no redirect)
    location /nginx-health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Documentation static file serving
    location /docs/ {
        alias /usr/share/nginx/html/docs/;
        autoindex on;
        charset utf-8;
        types {
            text/markdown md;
            text/css css;
            text/javascript js;
            application/json json;
            image/png png;
            image/svg+xml svg;
        }
    }

    # All other traffic -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- API Gateway (api.globalreach.com:443) ----
server {
    listen 443 ssl http2;
    server_name api.globalreach.com;

    # ════════════════════════════════════════════════════════
    # LET'S ENCRYPT CERTIFICATES (S119 — Production SSL)
    # ════════════════════════════════════════════════════════
    # Paths map to docker-compose.prod.yml volume mount:
    #   ./nginx/ssl/letsencrypt:/etc/nginx/ssl/le:ro
    #
    # After certbot issues:
    #   fullchain.pem → /etc/nginx/ssl/le/live/globalreach.com/fullchain.pem
    #   privkey.pem  → /etc/nginx/ssl/le/live/globalreach.com/privkey.pem
    # ════════════════════════════════════════════════════════
    ssl_certificate     /etc/nginx/ssl/le/live/globalreach.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/le/live/globalreach.com/privkey.pem;

    # DH Parameters (2048-bit, generated once)
    ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    # TLS Session Configuration
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern TLS Configuration (Mozilla Intermediate, March 2025)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP Stapling (requires LE cert to be live)
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/ssl/le/live/globalreach.com/chain.pem;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # HSTS (12 months per RFC 6797, include subdomains, preload)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security Headers (A++ rating)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' wss:;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # S112/PhaseI: Nginx L1 rate limit (50r/s)
    limit_req zone=api_limit burst=100 nodelay;
    client_max_body_size 50M;

    access_log /var/log/nginx/api_access.log main;
    error_log /var/log/nginx/api_error.log warn;

    # API Proxy
    location / {
        proxy_pass http://globalreach-api-prod:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    location /api/v1/health {
        proxy_pass http://globalreach-api-prod:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/docs {
        proxy_pass http://globalreach-api-prod:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- Frontend Web App (app.globalreach.com:443) - React SPA ----
server {
    listen 443 ssl http2;
    server_name app.globalreach.com;

    # Let's Encrypt Certificates (same as API)
    ssl_certificate     /etc/nginx/ssl/le/live/globalreach.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/le/live/globalreach.com/privkey.pem;
    ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/ssl/le/live/globalreach.com/chain.pem;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' wss: https://api.globalreach.com; worker-src 'self' blob:;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    root /var/www/frontend/dist;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~* (sw\.js|manifest\.json)$ {
        expires 0d;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://globalreach-api-prod:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/app_access.log main;
    error_log /var/log/nginx/app_error.log warn;
}

# ---- Monitoring Dashboard (monitor.globalreach.com:443) ----
server {
    listen 443 ssl http2;
    server_name monitor.globalreach.com grafana.globalreach.com;

    # Let's Encrypt Certificates
    ssl_certificate     /etc/nginx/ssl/le/live/globalreach.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/le/live/globalreach.com/privkey.pem;
    ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/ssl/le/live/globalreach.com/chain.pem;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    add_header Strict-Transport-Security "max-age=86400" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    auth_basic "GlobalReach Monitoring";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://globalreach-grafana:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cookie_path / "/; SameSite=Lax; Secure";
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    location /prometheus/ {
        proxy_pass http://globalreach-prometheus:9090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/monitor_access.log main;
    error_log /var/log/nginx/monitor_error.log warn;
}
