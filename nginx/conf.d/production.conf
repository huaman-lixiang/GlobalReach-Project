# GlobalReach V2.0 - Production Nginx Configuration
# Phase E: HTTPS + Security Hardening
# Session S063 | T03 Production Environment Setup
# ============================================================

# ---- HTTP → HTTPS Redirect (All Domains) ----
server {
    listen 80;
    server_name api.globalreach.com app.globalreach.com monitor.globalreach.com grafana.globalreach.com prometheus.globalreach.com localhost;

    # Health check endpoint (no redirect)
    location /nginx-health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # All other traffic -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- API Gateway (api.globalreach.com:443) ----
server {
    listen 443 ssl;
    http2 on;
    server_name api.globalreach.com;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/globalreach/globalreach.crt;
    ssl_certificate_key /etc/nginx/ssl/globalreach/globalreach.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (6 months, include subdomains)
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' wss:;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Access control
    limit_req zone=api_limit burst=20 nodelay;
    client_max_body_size 50M;

    # Access logs
    access_log /var/log/nginx/api_access.log main;
    error_log /var/log/nginx/api_error.log warn;

    # API Proxy
    location / {
        proxy_pass http://globalreach-api-prod:3000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Health check (no rate limiting needed)
    location /api/v1/health {
        proxy_pass http://globalreach-api-prod:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger docs
    location /api/v1/docs {
        proxy_pass http://globalreach-api-prod:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- Frontend Web App (app.globalreach.com:443) - React SPA ----
server {
    listen 443 ssl;
    http2 on;
    server_name app.globalreach.com;

    # SSL Configuration (same cert)
    ssl_certificate /etc/nginx/ssl/globalreach/globalreach.crt;
    ssl_certificate_key /etc/nginx/ssl/globalreach/globalreach.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' wss: https://api.globalreach.com; worker-src 'self' blob:;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # SPA root directory
    root /var/www/frontend/dist;
    index index.html;

    # Gzip compression for text assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Static assets with aggressive caching (hashed filenames = cache-safe)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Service Worker & manifest
    location ~* (sw\.js|manifest\.json)$ {
        expires 0d;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # API proxy (frontend calls backend)
    location /api/ {
        proxy_pass http://globalreach-api-prod:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # SPA fallback - all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/app_access.log main;
    error_log /var/log/nginx/app_error.log warn;
}

# ---- Monitoring Dashboard (monitor.globalreach.com:443) ----
server {
    listen 443 ssl;
    http2 on;
    server_name monitor.globalreach.com grafana.globalreach.com;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/globalreach/globalreach.crt;
    ssl_certificate_key /etc/nginx/ssl/globalreach/globalreach.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (shorter for monitoring)
    add_header Strict-Transport-Security "max-age=86400" always;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Basic auth for monitoring (optional security layer)
    auth_basic "GlobalReach Monitoring";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Grafana Proxy
    location / {
        proxy_pass http://globalreach-grafana:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cookie_path / "/; SameSite=Lax; Secure";

        # WebSocket support for live dashboards
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # Prometheus Proxy (restricted path)
    location /prometheus/ {
        proxy_pass http://globalreach-prometheus:9090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/monitor_access.log main;
    error_log /var/log/nginx/monitor_error.log warn;
}
