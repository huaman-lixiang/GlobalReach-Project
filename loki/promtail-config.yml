# S099/PhaseH: Grafana Promtail Configuration
# Uses Docker Service Discovery — auto-discovers all containers via /var/run/docker.sock
# Extracts container_name as label for LogQL filtering by service

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── All Docker Containers via Service Discovery ──
  - job_name: globalreach-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
        filters:
          - name: name
            values: [globalreach-*]

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container_name'
      - source_labels: ['__meta_docker_container_image']
        target_label: 'container_image'
      - source_labels: ['__meta_docker_container_label_environment']
        target_label: 'environment'

    pipeline_stages:
      # Parse Docker JSON log format: {"log":"...","stream":"stdout","time":"..."}
      - json:
          expressions:
            output: log
            stream: stream
            timestamp: time
      # Set timestamp from Docker's time field
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      # Extract structured fields if log line is JSON (API logs)
      - json:
          expressions:
            level: level
            method: method
            url: url
            status: status
            msg: message
          source: output
      - labels:
          level:
          stream:

      # S100/PhaseH: Metric Extraction — push log-derived counters to Loki/Mimir
      # These metrics are queryable via LogQL: sum(rate(...))
      - metrics:
          # API request count by HTTP method
          api_requests_total:
            type: Counter
            description: "Total API requests extracted from logs"
            config:
              match_all: true
              source: output
              action: inc
              bucket: "5m"
              labels:
                container_name: container_name
                method: method

          # API error count (status >= 400)
          api_errors_total:
            type: Counter
            description: "Total API errors (4xx/5xx) from logs"
            config:
              match_all: true
              source: output
              action: inc
              bucket: "5m"
              filters:
                - pattern: '"status":(4|5)\\d{1}'
                  value: ""
              labels:
                container_name: container_name
                status: status

          # Log volume per container (general throughput)
          log_lines_total:
            type: Counter
            description: "Total log lines per container"
            config:
              match_all: true
              source: output
              action: inc
              bucket: "5m"
              labels:
                container_name: container_name
                level: level

      - output:
          source: output
