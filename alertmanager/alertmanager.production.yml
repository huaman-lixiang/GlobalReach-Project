# S116/Post-Go-Live: Production AlertManager Configuration
# GlobalReach V2.0 — Production SMTP Notification System
#
# This is the PRODUCTION-READY version of alertmanager.yml.
# Switch from dev (Mailpit) to production SMTP by:
#   1. Setting SMTP_* environment variables in .env.production
#   2. Using this file instead of alertmanager.yml (or updating smarthost)
#
# ============================================
# Architecture: Prometheus (14 rules) → AlertManager → Production SMTP
# ============================================

global:
  resolve_timeout: 5m
  # Production SMTP configuration (override via env or edit below)
  smtp_smarthost: '${ALERTMANAGER_SMTP_SMARTHOST:-mailpit:1025}'
  smtp_from: '${ALERTMANAGER_SMTP_FROM:-alert@globalreach.local}'
  smtp_hello: '${ALERTMANAGER_SMTP_HELLO:-localhost}'
  # TLS: set to 'true' for production SMTP (SES/SendGrid/Gmail)
  smtp_require_tls: ${ALERTMANAGER_SMTP_REQUIRE_TLS:-false}
  smtp_auth_username: '${ALERTMANAGER_SMTP_USER:-}'
  smtp_auth_password: '${ALERTMANAGER_SMTP_PASS:-}'

# Inhibition rules: suppress lower-severity alerts when higher ones fire
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

  - source_match:
      alertname: 'APIHealthCritical'
    target_match:
      alertname: 'APIHealthDegraded'
    equal: ['instance', 'job']

# ============================================
# Receivers (Notification Channels)
# ============================================
receivers:
  # --- Receiver 1: Email (Primary Channel) ---
  - name: 'email-primary'
    email_configs:
      - to: '${ALERTMANAGER_EMAIL_TO:-admin@globalreach.com}'
        from: '${ALERTMANAGER_SMTP_FROM:-alert@globalreach.local}'
        smarthost: '${ALERTMANAGER_SMTP_SMARTHOST:-mailpit:1025}'
        auth_username: '${ALERTMANAGER_SMTP_USER:-}'
        auth_password: '${ALERTMANAGER_SMTP_PASS:-}'
        require_tls: ${ALERTMANAGER_SMTP_REQUIRE_TLS:-false}
        send_resolved: true
        html: |
          <h2 style="color: {{ if eq .Status "firing" }}red{{ else }}green{{ end }}">
            {{ .Status | toUpper }} — GlobalReach V2.0 Alert
          </h2>
          <table border="1" cellpadding="4" style="border-collapse:collapse">
            <tr><td><b>Alert</b></td><td>{{ .CommonLabels.alertname }}</td></tr>
            <tr><td><b>Severity</b></td><td>{{ .CommonLabels.severity }}</td></tr>
            <tr><td><b>Instance</b></td><td>{{ .CommonLabels.instance }}</td></tr>
            <tr><td><b>Team</b></td><td>{{ .CommonLabels.team }}</td></tr>
            <tr><td><b>Fired At</b></td><td>{{ .Alerts.Firing.StartsAt.Format "2006-01-02 15:04:05" }}</td></tr>
          </table>
          <p><b>Summary:</b> {{ .CommonAnnotations.summary }}</p>
          <p><b>Description:</b> {{ .CommonAnnotations.description }}</p>
          {{ if gt (len .Alerts.Resolved) 0 }}
          <hr>
          <p style="color:green"><b>✅ RESOLVED at:</b> {{ .Alerts.Resolved.EndsAt.Format "2006-01-02 15:04:05" }}</p>
          {{ end }}
          <hr>
          <p style="font-size:11px;color:#999">
            GlobalReach V2.0 Monitoring System &mdash;
            <a href="https://monitor.globalreach.com">Dashboard</a> |
            <a href="https://api.globalreach.com/api/v1/health">Health API</a>
          </p>

  # --- Receiver 2: Webhook (GlobalReach API Integration) ---
  # M-C03: Webhook Listener Enablement - Points to GlobalReach API
  - name: 'webhook-integration'
    webhook_configs:
      - url: '${ALERTMANAGER_WEBHOOK_URL:-http://globalreach-api:3000/api/v1/webhooks/alertmanager}'
        send_resolved: true
        http_config:
          bearer_token: '${WEBHOOK_SECRET:-}'
        max_alerts_per_message: 50

  # --- Receiver 3: Critical Multi-channel (Email + Webhook) ---
  # M-C03: Webhook enabled — routes alerts to GlobalReach API for processing
  - name: 'critical-multi'
    email_configs:
      - to: '${ALERTMANAGER_EMAIL_TO:-admin@globalreach.com}'
        from: '${ALERTMANAGER_SMTP_FROM:-alert@globalreach.local}'
        smarthost: '${ALERTMANAGER_SMTP_SMARTHOST:-mailpit:1025}'
        auth_username: '${ALERTMANAGER_SMTP_USER:-}'
        auth_password: '${ALERTMANAGER_SMTP_PASS:-}'
        require_tls: ${ALERTMANAGER_SMTP_REQUIRE_TLS:-false}
        send_resolved: true
    webhook_configs:
      - url: '${ALERTMANAGER_WEBHOOK_URL:-http://globalreach-api:3000/api/v1/webhooks/alertmanager}'
        send_resolved: true
        http_config:
          bearer_token: '${WEBHOOK_SECRET:-}'
        max_alerts_per_message: 50

# ============================================
# Route Tree (Notification Routing by Severity + Team)
# ============================================
route:
  receiver: 'email-primary'
  group_by: ['alertname', 'severity', 'team']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 8h
  routes:
    # Route 1: CRITICAL → Immediate multi-channel (30m repeat)
    - matchers:
        - severity = "critical"
      receiver: 'critical-multi'
      continue: true
      group_by: ['alertname', 'instance']
      group_wait: 10s
      group_interval: 2m
      repeat_interval: 30m

    # Route 2: WARNING → Aggregated email (4h repeat)
    - matchers:
        - severity = "warning"
      receiver: 'email-primary'
      continue: true
      group_by: ['alertname', 'team']
      group_wait: 60s
      group_interval: 10m
      repeat_interval: 4h

    # Route 3: Team Platform → Critical escalation path
    - matchers:
        - team = "platform"
      receiver: 'critical-multi'
      continue: true
      group_by: ['alertname', 'severity']
      group_wait: 15s
      group_interval: 5m
      repeat_interval: 2h

    # Route 4: Team Database → Warning digest (6h repeat)
    - matchers:
        - team = "database"
      receiver: 'email-primary'
      continue: false
      group_by: ['alertname', 'severity']
      group_wait: 60s
      group_interval: 15m
      repeat_interval: 6h

    # Route 5: Team Infra → Warning digest (6h repeat)
    - matchers:
        - team = "infra"
      receiver: 'email-primary'
      continue: false
      group_by: ['alertname', 'severity']
      group_wait: 60s
      group_interval: 15m
      repeat_interval: 6h
