# S107/PhaseH: Prometheus AlertManager Configuration
# GlobalReach V2.0 Production Notification System
#
# Architecture:
#   Prometheus (14 rules) → AlertManager → Email / Webhook receivers
#
# Routing Strategy:
#   severity=critical  → immediate email (5m repeat)
#   severity=warning   → aggregated email (4h repeat)
#   team=database      → warning-digest (6h repeat)
#   team=infra         → warning-digest (6h repeat)

global:
  resolve_timeout: 5m
  # S126/QQ Mail SMTP Production Configuration
  smtp_smarthost: 'smtp.qq.com:465'
  smtp_from: '1390885333@qq.com'
  smtp_hello: 'qq.com'
  smtp_require_tls: true
  smtp_auth_username: '1390885333@qq.com'
  smtp_auth_password: 'zhrtbpzlgfoehjgj'

# Inhibition rules: suppress lower-severity alerts when higher ones fire
# M-B04: Enhanced inhibition rules for noise reduction
inhibit_rules:
  # Rule 1: When any critical alert fires, suppress warnings on same instance
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['instance']

  # Rule 2: APIHealthCritical suppresses APIHealthDegraded (same resource)
  - source_match:
      alertname: 'APIHealthCritical'
    target_match:
      alertname: 'APIHealthDegraded'
    equal: ['instance', 'job']

  # Rule 3: APIDown suppresses all other API-related alerts on same instance
  - source_match:
      alertname: 'APIDown'
    target_match_re:
      alertname: '.*API.*|.*Latency.*|.*Error.*|.*Throughput.*'
    equal: ['instance']

  # Rule 4: EmailQueueCritical suppresses EmailQueueBacklog (same queue)
  - source_match:
      alertname: 'EmailQueueCritical'
    target_match:
      alertname: 'EmailQueueBacklog'
    equal: ['team']

  # Rule 5: ContainerRestartLoop suppresses memory/CPU pressure on same container
  - source_match:
      alertname: 'ContainerRestartLoop'
    target_match_re:
      alertname: '.*Memory.*|.*CPU.*'
    equal: ['instance']

  # S132/O01: AIOps Enhanced Inhibition Rules
  # Rule 6: AlertStormDetected suppresses individual component alerts during storm
  - source_match:
      alertname: 'AlertStormDetected'
    target_match_re:
      alertname: '.+'
    equal: ['team']
    target_match:
      severity: 'warning'

  # Rule 7: RootCauseCandidate suppresses symptom alerts (downstream)
  - source_match:
      alertname: 'RootCauseCandidate'
    target_match_re:
      alertname: '.*Error.*|.*Latency.*|.*Degraded.*|.*Health.*'
    equal: ['instance']

  # Rule 8: AutoHealingTriggered suppresses duplicate notifications for auto-healed issues
  - source_match:
      alertname: 'AutoHealingTriggered'
    target_match:
      severity: 'warning'
    equal: ['instance']

# ============================================
# Receivers (Notification Channels)
# ============================================
receivers:
  # --- Receiver 1: Email (Primary Channel via QQ Mail SMTP) ---
  - name: 'email-primary'
    email_configs:
      - to: '1390885333@qq.com'
        from: '1390885333@qq.com'
        smarthost: 'smtp.qq.com:465'
        auth_username: '1390885333@qq.com'
        auth_password: 'zhrtbpzlgfoehjgj'
        require_tls: true
        send_resolved: true
        html: |
          <h2 style="color: {{ if eq .Status "firing" }}red{{ else }}green{{ end }}">
            {{ .Status | toUpper }}
          </h2>
          <table border="1" cellpadding="4">
            <tr><td><b>Alert</b></td><td>{{ .CommonLabels.alertname }}</td></tr>
            <tr><td><b>Severity</b></td><td>{{ .CommonLabels.severity }}</td></tr>
            <tr><td><b>Instance</b></td><td>{{ .CommonLabels.instance }}</td></tr>
            <tr><td><b>Team</b></td><td>{{ .CommonLabels.team }}</td></tr>
            <tr><td><b>Fired At</b></td><td>{{ .Alerts.Firing.StartsAt.Format "2006-01-02 15:04:05" }}</td></tr>
          </table>
          <p><b>Summary:</b> {{ .CommonAnnotations.summary }}</p>
          <p><b>Description:</b> {{ .CommonAnnotations.description }}</p>
          {{ if gt (len .Alerts.Resolved) 0 }}
          <p style="color:green"><b>Resolved:</b> {{ .Alerts.Resolved.EndsAt.Format "2006-01-02 15:04:05" }}</p>
          {{ end }}

  # --- Receiver 2: Webhook (GlobalReach API Integration) ---
  # M-C03: Webhook Listener Enablement - Points to GlobalReach API
  - name: 'webhook-integration'
    webhook_configs:
      - url: 'http://globalreach-api:3000/api/v1/webhooks/alertmanager'
        send_resolved: true
        http_config:
          bearer_token: '${WEBHOOK_SECRET:-}'

  # --- Receiver 3: Critical Multi-channel (Email via QQ Mail + Webhook) ---
  # M-C03: Webhook enabled — routes alerts to GlobalReach API for processing
  - name: 'critical-multi'
    email_configs:
      - to: '1390885333@qq.com'
        from: '1390885333@qq.com'
        smarthost: 'smtp.qq.com:465'
        auth_username: '1390885333@qq.com'
        auth_password: 'zhrtbpzlgfoehjgj'
        require_tls: true
        send_resolved: true
    webhook_configs:
      - url: 'http://globalreach-api:3000/api/v1/webhooks/alertmanager'
        send_resolved: true
        http_config:
          bearer_token: '${WEBHOOK_SECRET:-}'

  # S132/O01: AIOps Dedicated Receivers
  # --- Receiver 4: AIOps Webhook (Primary for correlation engine) ---
  - name: 'aiops-webhook-primary'
    webhook_configs:
      - url: 'http://globalreach-api:3000/api/v1/webhooks/alertmanager'
        send_resolved: true
        http_config:
          bearer_token: '${WEBHOOK_SECRET:-}'

  # --- Receiver 5: AIOps Info-level (Low priority, aggregated) ---
  - name: 'aiops-info-digest'
    email_configs:
      - to: '1390885333@qq.com'
        from: '1390885333@qq.com'
        smarthost: 'smtp.qq.com:465'
        auth_username: '1390885333@qq.com'
        auth_password: 'zhrtbpzlgfoehjgj'
        require_tls: true
        send_resolved: true
        html: |
          <h3 style="color: #666">AIOps Information Digest</h3>
          <p><b>Alert:</b> {{ .CommonLabels.alertname }}</p>
          <p><b>Category:</b> {{ .CommonLabels.category }}</p>
          <p><b>Summary:</b> {{ .CommonAnnotations.summary }}</p>
          <hr>
          <small>This is an automated AIOps informational alert. No immediate action required.</small>

# ============================================
# Route Tree (Notification Routing by Severity + Team)
# ============================================
route:
  receiver: 'email-primary'           # Default receiver for unmatched alerts
  group_by: ['severity', 'alertname', 'team']  # M-B04: Priority grouping by severity first
  group_wait: 30s                     # Wait before sending first notification
  group_interval: 5m                  # Wait before sending new notification about same group
  repeat_interval: 8h                 # Resend after 8 hours if still firing
  routes:
    # Route 1: CRITICAL → Immediate multi-channel (email+webhook, 30m repeat)
    - matchers:
        - severity = "critical"
      receiver: 'critical-multi'
      continue: true
      group_by: ['alertname', 'instance']
      group_wait: 10s
      group_interval: 2m
      repeat_interval: 30m

    # Route 2: WARNING → Aggregated email (4h repeat)
    - matchers:
        - severity = "warning"
      receiver: 'email-primary'
      continue: true
      group_by: ['alertname', 'team']
      group_wait: 60s
      group_interval: 10m
      repeat_interval: 4h

    # Route 3: Team Platform → Critical escalation path
    - matchers:
        - team = "platform"
      receiver: 'critical-multi'
      continue: true
      group_by: ['alertname', 'severity']
      group_wait: 15s
      group_interval: 5m
      repeat_interval: 2h

    # Route 4: Team Database → Warning digest
    - matchers:
        - team = "database"
      receiver: 'email-primary'
      continue: false
      group_by: ['alertname', 'severity']
      group_wait: 60s
      group_interval: 15m
      repeat_interval: 6h

    # Route 5: Team Infra → Warning digest
    - matchers:
        - team = "infra"
      receiver: 'email-primary'
      continue: false
      group_by: ['alertname', 'severity']
      group_wait: 60s
      group_interval: 15m
      repeat_interval: 6h

    # S132/O01: AIOps Route Branches
    # Route 6: AIOps Meta Alerts → Dedicated AIOps receiver with info-level handling
    - matchers:
        - category =~ "aiops_.*"
      receiver: 'aiops-webhook-primary'
      continue: true
      group_by: ['category', 'alertname']
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 30m

    # Route 7: AIOps Info-level alerts → Digest email (low priority)
    - matchers:
        - category = "aiops_meta"
        - severity = "info"
      receiver: 'aiops-info-digest'
      continue: false
      group_by: ['category', 'alertname']
      group_wait: 300s
      group_interval: 30m
      repeat_interval: 24h

    # Route 8: Root Cause Candidates → Webhook for correlation engine analysis
    - matchers:
        - alertname = "RootCauseCandidate"
      receiver: 'aiops-webhook-primary'
      continue: true
      group_by: ['instance', 'alertname']
      group_wait: 5s
      group_interval: 30s
      repeat_interval: 1h

    # Route 9: Auto-healing notifications → Webhook for audit trail
    - matchers:
        - alertname = "AutoHealingTriggered"
      receiver: 'aiops-webhook-primary'
      continue: false
      group_by: ['level', 'action_type', 'result']
      group_wait: 5s
      group_interval: 1m
      repeat_interval: 4h
