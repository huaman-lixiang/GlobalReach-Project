# GlobalReach V2.0 多平台配置文件
# 支持平台: Gmail / Outlook / QQ邮箱 / 163邮箱 / 企业自定义SMTP

platforms:
  gmail:
    name: "Gmail"
    enabled: true
    imap:
      host: "imap.gmail.com"
      port: 993
      secure: true
    smtp:
      host: "smtp.gmail.com"
      port: 465
      secure: true
    auth_modes:
      - oauth2
      - app-password
    rate_limit:
      daily: 100
      hourly: 20
    features:
      - labels
      - categories
      - threads

  outlook:
    name: "Outlook"
    enabled: true
    imap:
      host: "outlook.office365.com"
      port: 993
      secure: true
    smtp:
      host: "smtp.office365.com"
      port: 587
      secure: false
      tls: true
    auth_modes:
      - oauth2
      - basic
    rate_limit:
      daily: 50
      hourly: 15
    features:
      - folders
      - categories
      - rules

  qq:
    name: "QQ邮箱"
    enabled: true
    imap:
      host: "imap.qq.com"
      port: 993
      secure: true
    smtp:
      host: "smtp.qq.com"
      port: 465
      secure: true
    auth_modes:
      - authorization-code
    rate_limit:
      daily: 200
      hourly: 50
    features:
      - folders
      - tags

  '163':
    name: "163邮箱"
    enabled: true
    imap:
      host: "imap.163.com"
      port: 993
      secure: true
    smtp:
      host: "smtp.163.com"
      port: 465
      secure: true
    auth_modes:
      - authorization-code
    rate_limit:
      daily: 200
      hourly: 50
    features:
      - folders
      - tags

  custom:
    name: "企业自定义SMTP"
    enabled: false
    imap:
      host: ""
      port: 993
      secure: true
    smtp:
      host: ""
      port: 587
      secure: false
      tls: true
    auth_modes:
      - basic
      - tls
    rate_limit:
      daily: 500
      hourly: 100
    features:
      - custom

# 全局配置
global_settings:
  connection_pool:
    max_connections: 10
    idle_timeout: 300000
  
  async_queue:
    max_concurrency: 5
    retry_attempts: 3
    retry_delay: 1000
  
  health_monitoring:
    check_interval: 300000
    alert_thresholds:
      error_rate: 0.1
      response_time: 30000
      consecutive_failures: 3

# 区域偏好设置 (用于智能账号选择)
region_preferences:
  US:
    primary: gmail
    secondary: outlook
  EU:
    primary: outlook
    secondary: gmail
  CN:
    primary: qq
    secondary: "163"
  ASIA:
    primary: qq
    secondary: outlook
  DEFAULT:
    primary: gmail
    secondary: outlook
