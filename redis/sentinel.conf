# GlobalReach V2.0 — Redis Sentinel 配置模板
# ==================================================
# 文档: docs/HIGH_AVAILABILITY_ARCHITECTURE.md 第四章 §4.2
# 架构: 1 Master + 2 Slave + 3 Sentinel (quorum=2)
# 防脑裂: 至少 2 个 Sentinel 同意才执行故障转移
# ==================================================

# ---- 监控目标 ----
# mymaster: Sentinel 监控的主节点名称 (应用代码中 REDIS_MASTER_NAME 使用此值)
sentinel monitor mymaster redis-master 6379 2

# ---- 故障判定参数 ----
# down-after-milliseconds: 多少毫秒无响应判定为 SDOWN (主观下线)
sentinel down-after-milliseconds mymaster 30000

# failover-timeout: 故障转移超时时间 (ms)
sentinel failover-timeout mymaster 180000

# parallel-syncs: 同时从新 Master 同步数据的 Slave 数量
sentinel parallel-syncs mymaster 1

# ---- 认证配置 ----
# 与 redis-master 的 --requirepass 和 --masterauth 保持一致
sentinel auth-pass mymaster globalreach_redis_ha_2026

# ---- 配置传播 ----
# Sentinel 自动重写配置时通知其他节点
sentinel config-epoch mymaster 0

# ---- 运行时覆盖 (Docker 环境必需) ----
# Docker 容器需要显式声明端口和 IP
port 26379
sentinel resolve-hostnames no
sentinel announce-ip ${SENTINEL_ANNOUNCE_IP:-127.0.0.1}
sentinel announce-port ${SENTINEL_ANNOUNCE_PORT:-26379}

# ---- 日志 ----
loglevel notice
logfile ""
